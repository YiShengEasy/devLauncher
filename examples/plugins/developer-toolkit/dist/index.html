<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Developer Toolkit</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101116;
        --panel: rgba(255, 255, 255, 0.045);
        --panel-strong: rgba(255, 255, 255, 0.07);
        --line: rgba(255, 255, 255, 0.12);
        --text: #e8eaf0;
        --muted: rgba(255, 255, 255, 0.56);
        --accent: #f6b44b;
        --accent-2: #2ec4b6;
        --danger: #ff6b6b;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Avenir, Helvetica, Arial, sans-serif;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0)),
          var(--bg);
        color: var(--text);
      }

      button, input, textarea, select {
        font: inherit;
      }

      button {
        min-height: 31px;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 7px;
        padding: 0 10px;
        background: rgba(255, 255, 255, 0.07);
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover { border-color: rgba(246, 180, 75, 0.52); }
      button:disabled { cursor: not-allowed; opacity: 0.48; }

      .app {
        width: 100%;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 10px;
        padding: 12px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1.25;
        letter-spacing: 0;
      }

      #status {
        margin: 3px 0 0;
        min-height: 16px;
        color: var(--muted);
        font-size: 11px;
        line-height: 16px;
      }

      #status.error { color: var(--danger); }

      .tabs {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .tab {
        flex: 0 0 auto;
        min-width: 82px;
        background: var(--panel);
      }

      .tab.active {
        border-color: rgba(246, 180, 75, 0.6);
        background: rgba(246, 180, 75, 0.14);
        color: #fff4df;
      }

      .tool-panel {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        padding: 12px;
      }

      .tool-grid {
        height: 100%;
        min-height: 360px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 12px;
      }

      .pane {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 8px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      label {
        display: grid;
        gap: 5px;
        min-width: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      input, textarea, select, .output {
        width: 100%;
        min-width: 0;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.055);
        color: var(--text);
        outline: none;
        font-size: 12px;
      }

      input, select {
        min-height: 31px;
        padding: 6px 9px;
      }

      textarea, .output {
        min-height: 210px;
        padding: 10px 11px;
        resize: none;
        overflow: auto;
        line-height: 1.5;
        font-family: Consolas, "Cascadia Code", Menlo, monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .output {
        background: rgba(0, 0, 0, 0.16);
      }

      .hint {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .two { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .three { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }

      .qr-stage {
        display: grid;
        place-items: center;
        min-height: 250px;
      }

      .qr-card {
        display: grid;
        place-items: center;
        width: min(100%, 320px);
        aspect-ratio: 1;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: #fff;
        padding: 14px;
      }

      .qr-card svg { width: 100%; height: 100%; display: block; }

      @media (max-width: 720px) {
        .app { padding: 10px; }
        .tool-grid { grid-template-columns: 1fr; min-height: 0; }
        .two, .three { grid-template-columns: 1fr; }
        textarea, .output { min-height: 150px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Developer Toolkit</h1>
          <p id="status">Ready</p>
        </div>
        <button id="copyResult" type="button">复制</button>
      </header>
      <nav class="tabs" aria-label="Tools"></nav>
      <section id="toolPanel" class="tool-panel"></section>
    </main>

    <script>
      const tabs = [
        { id: "timestamp", label: "Timestamp" },
        { id: "codec", label: "Codec" },
        { id: "regex", label: "Regex" },
        { id: "cron", label: "Cron" },
        { id: "qrcode", label: "QRCode" }
      ];

      function readStorage(key, fallback) {
        try {
          return localStorage.getItem(key) || fallback;
        } catch {
          return fallback;
        }
      }

      function writeStorage(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch {
          // Sandboxed plugin iframes may block storage; the plugin still works without persistence.
        }
      }

      const storage = {
        get activeTab() {
          return readStorage("devlauncher.developerToolkit.activeTab", "timestamp");
        },
        set activeTab(value) {
          writeStorage("devlauncher.developerToolkit.activeTab", value);
        }
      };

      const state = {
        activeTab: tabs.some((tab) => tab.id === storage.activeTab) ? storage.activeTab : "timestamp",
        lastCopyText: "",
        qrSvg: ""
      };

      const statusEl = document.querySelector("#status");
      const tabsEl = document.querySelector(".tabs");
      const panelEl = document.querySelector("#toolPanel");
      const copyButton = document.querySelector("#copyResult");

      function setStatus(message, kind = "") {
        statusEl.textContent = message;
        statusEl.className = kind;
      }

      async function copyText(text) {
        if (!text) {
          setStatus("没有可复制内容", "error");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          setStatus("已复制");
        } catch {
          setStatus("复制不可用，请手动选择结果", "error");
        }
      }

      copyButton.addEventListener("click", () => copyText(state.lastCopyText));

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function setOutput(text) {
        state.lastCopyText = text || "";
        const output = panelEl.querySelector("[data-output]");
        if (output) output.textContent = text || "";
      }

      function parseTimestampInput(value) {
        const text = value.trim();
        if (!text) return new Date();
        if (/^\d{13}$/.test(text)) return new Date(Number(text));
        if (/^\d{10}$/.test(text)) return new Date(Number(text) * 1000);
        const parsed = new Date(text);
        if (Number.isNaN(parsed.getTime())) throw new Error("无法解析时间");
        return parsed;
      }

      function formatDateBundle(date) {
        const ms = date.getTime();
        return [
          `Local: ${date.toLocaleString()}`,
          `ISO: ${date.toISOString()}`,
          `Unix 秒: ${Math.floor(ms / 1000)}`,
          `Unix 毫秒: ${ms}`
        ].join("\n");
      }

      function utf8ToBase64(value) {
        return btoa(String.fromCharCode(...new TextEncoder().encode(value)));
      }

      function base64ToUtf8(value) {
        const bytes = Uint8Array.from(atob(value.trim()), (char) => char.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      }

      function toHex(buffer) {
        return Array.from(new Uint8Array(buffer), (byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      async function digestText(algorithm, value) {
        return toHex(await crypto.subtle.digest(algorithm, new TextEncoder().encode(value)));
      }

      function md5(input) {
        function cmn(q, a, b, x, s, t) {
          a = add32(add32(a, q), add32(x, t));
          return add32((a << s) | (a >>> (32 - s)), b);
        }
        function ff(a, b, c, d, x, s, t) { return cmn((b & c) | (~b & d), a, b, x, s, t); }
        function gg(a, b, c, d, x, s, t) { return cmn((b & d) | (c & ~d), a, b, x, s, t); }
        function hh(a, b, c, d, x, s, t) { return cmn(b ^ c ^ d, a, b, x, s, t); }
        function ii(a, b, c, d, x, s, t) { return cmn(c ^ (b | ~d), a, b, x, s, t); }
        function add32(a, b) { return (a + b) & 0xffffffff; }
        function md5cycle(x, k) {
          let [a, b, c, d] = x;
          a = ff(a, b, c, d, k[0], 7, -680876936); d = ff(d, a, b, c, k[1], 12, -389564586); c = ff(c, d, a, b, k[2], 17, 606105819); b = ff(b, c, d, a, k[3], 22, -1044525330);
          a = ff(a, b, c, d, k[4], 7, -176418897); d = ff(d, a, b, c, k[5], 12, 1200080426); c = ff(c, d, a, b, k[6], 17, -1473231341); b = ff(b, c, d, a, k[7], 22, -45705983);
          a = ff(a, b, c, d, k[8], 7, 1770035416); d = ff(d, a, b, c, k[9], 12, -1958414417); c = ff(c, d, a, b, k[10], 17, -42063); b = ff(b, c, d, a, k[11], 22, -1990404162);
          a = ff(a, b, c, d, k[12], 7, 1804603682); d = ff(d, a, b, c, k[13], 12, -40341101); c = ff(c, d, a, b, k[14], 17, -1502002290); b = ff(b, c, d, a, k[15], 22, 1236535329);
          a = gg(a, b, c, d, k[1], 5, -165796510); d = gg(d, a, b, c, k[6], 9, -1069501632); c = gg(c, d, a, b, k[11], 14, 643717713); b = gg(b, c, d, a, k[0], 20, -373897302);
          a = gg(a, b, c, d, k[5], 5, -701558691); d = gg(d, a, b, c, k[10], 9, 38016083); c = gg(c, d, a, b, k[15], 14, -660478335); b = gg(b, c, d, a, k[4], 20, -405537848);
          a = gg(a, b, c, d, k[9], 5, 568446438); d = gg(d, a, b, c, k[14], 9, -1019803690); c = gg(c, d, a, b, k[3], 14, -187363961); b = gg(b, c, d, a, k[8], 20, 1163531501);
          a = gg(a, b, c, d, k[13], 5, -1444681467); d = gg(d, a, b, c, k[2], 9, -51403784); c = gg(c, d, a, b, k[7], 14, 1735328473); b = gg(b, c, d, a, k[12], 20, -1926607734);
          a = hh(a, b, c, d, k[5], 4, -378558); d = hh(d, a, b, c, k[8], 11, -2022574463); c = hh(c, d, a, b, k[11], 16, 1839030562); b = hh(b, c, d, a, k[14], 23, -35309556);
          a = hh(a, b, c, d, k[1], 4, -1530992060); d = hh(d, a, b, c, k[4], 11, 1272893353); c = hh(c, d, a, b, k[7], 16, -155497632); b = hh(b, c, d, a, k[10], 23, -1094730640);
          a = hh(a, b, c, d, k[13], 4, 681279174); d = hh(d, a, b, c, k[0], 11, -358537222); c = hh(c, d, a, b, k[3], 16, -722521979); b = hh(b, c, d, a, k[6], 23, 76029189);
          a = hh(a, b, c, d, k[9], 4, -640364487); d = hh(d, a, b, c, k[12], 11, -421815835); c = hh(c, d, a, b, k[15], 16, 530742520); b = hh(b, c, d, a, k[2], 23, -995338651);
          a = ii(a, b, c, d, k[0], 6, -198630844); d = ii(d, a, b, c, k[7], 10, 1126891415); c = ii(c, d, a, b, k[14], 15, -1416354905); b = ii(b, c, d, a, k[5], 21, -57434055);
          a = ii(a, b, c, d, k[12], 6, 1700485571); d = ii(d, a, b, c, k[3], 10, -1894986606); c = ii(c, d, a, b, k[10], 15, -1051523); b = ii(b, c, d, a, k[1], 21, -2054922799);
          a = ii(a, b, c, d, k[8], 6, 1873313359); d = ii(d, a, b, c, k[15], 10, -30611744); c = ii(c, d, a, b, k[6], 15, -1560198380); b = ii(b, c, d, a, k[13], 21, 1309151649);
          a = ii(a, b, c, d, k[4], 6, -145523070); d = ii(d, a, b, c, k[11], 10, -1120210379); c = ii(c, d, a, b, k[2], 15, 718787259); b = ii(b, c, d, a, k[9], 21, -343485551);
          x[0] = add32(a, x[0]); x[1] = add32(b, x[1]); x[2] = add32(c, x[2]); x[3] = add32(d, x[3]);
        }
        function md5blk(bytes) {
          const out = [];
          for (let i = 0; i < 64; i += 4) out[i >> 2] = bytes[i] + (bytes[i + 1] << 8) + (bytes[i + 2] << 16) + (bytes[i + 3] << 24);
          return out;
        }
        const bytes = Array.from(new TextEncoder().encode(input));
        const state = [1732584193, -271733879, -1732584194, 271733878];
        let i = 0;
        for (; i + 64 <= bytes.length; i += 64) md5cycle(state, md5blk(bytes.slice(i, i + 64)));
        const tail = bytes.slice(i);
        tail.push(0x80);
        while (tail.length % 64 !== 56) tail.push(0);
        const bitLen = bytes.length * 8;
        for (let j = 0; j < 8; j++) tail.push((bitLen / Math.pow(256, j)) & 0xff);
        for (let j = 0; j < tail.length; j += 64) md5cycle(state, md5blk(tail.slice(j, j + 64)));
        return state.map((n) => {
          let s = "";
          for (let j = 0; j < 4; j++) s += ((n >> (j * 8)) & 0xff).toString(16).padStart(2, "0");
          return s;
        }).join("");
      }

      function decodeJwt(token) {
        const parts = token.trim().split(".");
        if (parts.length !== 3) throw new Error("JWT must have header.payload.signature");
        const decodePart = (part) => JSON.stringify(JSON.parse(base64ToUtf8(part.replaceAll("-", "+").replaceAll("_", "/").padEnd(Math.ceil(part.length / 4) * 4, "="))), null, 2);
        return `Header\n${decodePart(parts[0])}\n\nPayload\n${decodePart(parts[1])}`;
      }

      function runRegex(pattern, flags, source) {
        const safeFlags = Array.from(new Set((flags || "g").replace(/[^gimsu]/g, "").split(""))).join("");
        const regex = new RegExp(pattern, safeFlags.includes("g") ? safeFlags : `${safeFlags}g`);
        const matches = [];
        for (const match of source.matchAll(regex)) {
          matches.push({ index: match.index || 0, text: match[0], captures: match.slice(1) });
          if (match[0] === "") regex.lastIndex += 1;
        }
        return matches;
      }

      function parseCronField(part, min, max) {
        const values = new Set();
        const addRange = (start, end, step = 1) => {
          if (start < min || end > max || start > end || step < 1) throw new Error("Cron 字段超出范围");
          for (let i = start; i <= end; i += step) values.add(i);
        };
        for (const token of part.split(",")) {
          const [range, stepRaw] = token.split("/");
          const step = stepRaw ? Number(stepRaw) : 1;
          if (range === "*") addRange(min, max, step);
          else if (range.includes("-")) {
            const [start, end] = range.split("-").map(Number);
            addRange(start, end, step);
          } else {
            const value = Number(range);
            if (!Number.isInteger(value)) throw new Error("Cron 字段必须是数字");
            addRange(value, value, step);
          }
        }
        return values;
      }

      function parseCron(expr) {
        const parts = expr.trim().split(/\s+/);
        if (parts.length !== 5) throw new Error("仅支持 5 段 Unix cron");
        return {
          minute: parseCronField(parts[0], 0, 59),
          hour: parseCronField(parts[1], 0, 23),
          day: parseCronField(parts[2], 1, 31),
          month: parseCronField(parts[3], 1, 12),
          weekday: parseCronField(parts[4], 0, 7)
        };
      }

      function nextCronRuns(expr, count = 5) {
        const cron = parseCron(expr);
        const runs = [];
        const cursor = new Date();
        cursor.setSeconds(0, 0);
        cursor.setMinutes(cursor.getMinutes() + 1);
        const maxMinutes = 366 * 24 * 60;
        for (let i = 0; i < maxMinutes && runs.length < count; i++) {
          const weekday = cursor.getDay();
          const weekdayMatch = cron.weekday.has(weekday) || (weekday === 0 && cron.weekday.has(7));
          if (cron.minute.has(cursor.getMinutes()) && cron.hour.has(cursor.getHours()) && cron.day.has(cursor.getDate()) && cron.month.has(cursor.getMonth() + 1) && weekdayMatch) {
            runs.push(new Date(cursor));
          }
          cursor.setMinutes(cursor.getMinutes() + 1);
        }
        if (!runs.length) throw new Error("一年内没有匹配的执行时间");
        return runs;
      }

      const QR_CAPACITY = [
        null,
        { version: 1, data: 19, ecc: 7, align: [] },
        { version: 2, data: 34, ecc: 10, align: [6, 18] },
        { version: 3, data: 55, ecc: 15, align: [6, 22] },
        { version: 4, data: 80, ecc: 20, align: [6, 26] }
      ];

      function gfTables() {
        const exp = new Array(512);
        const log = new Array(256);
        let x = 1;
        for (let i = 0; i < 255; i++) {
          exp[i] = x;
          log[x] = i;
          x <<= 1;
          if (x & 0x100) x ^= 0x11d;
        }
        for (let i = 255; i < 512; i++) exp[i] = exp[i - 255];
        return { exp, log };
      }

      const GF = gfTables();

      function gfMul(a, b) {
        return a && b ? GF.exp[GF.log[a] + GF.log[b]] : 0;
      }

      function rsGenerator(degree) {
        let poly = [1];
        for (let i = 0; i < degree; i++) {
          const next = new Array(poly.length + 1).fill(0);
          for (let j = 0; j < poly.length; j++) {
            next[j] ^= poly[j];
            next[j + 1] ^= gfMul(poly[j], GF.exp[i]);
          }
          poly = next;
        }
        return poly;
      }

      function rsRemainder(data, degree) {
        const gen = rsGenerator(degree);
        const result = data.concat(new Array(degree).fill(0));
        for (let i = 0; i < data.length; i++) {
          const coef = result[i];
          if (!coef) continue;
          for (let j = 0; j < gen.length; j++) result[i + j] ^= gfMul(gen[j], coef);
        }
        return result.slice(result.length - degree);
      }

      function bitsToBytes(bits) {
        const out = [];
        for (let i = 0; i < bits.length; i += 8) out.push(parseInt(bits.slice(i, i + 8).join("").padEnd(8, "0"), 2));
        return out;
      }

      function encodeQrData(text, version) {
        const bytes = Array.from(new TextEncoder().encode(text));
        const cap = QR_CAPACITY[version];
        const bits = [0, 1, 0, 0];
        const countBits = version < 10 ? 8 : 16;
        for (let i = countBits - 1; i >= 0; i--) bits.push((bytes.length >> i) & 1);
        for (const byte of bytes) for (let i = 7; i >= 0; i--) bits.push((byte >> i) & 1);
        const maxBits = cap.data * 8;
        const terminator = Math.min(4, maxBits - bits.length);
        for (let i = 0; i < terminator; i++) bits.push(0);
        while (bits.length % 8) bits.push(0);
        const data = bitsToBytes(bits);
        const pads = [0xec, 0x11];
        let pad = 0;
        while (data.length < cap.data) data.push(pads[pad++ % 2]);
        return data;
      }

      function makeMatrix(size) {
        return {
          size,
          data: Array.from({ length: size }, () => Array(size).fill(false)),
          reserved: Array.from({ length: size }, () => Array(size).fill(false))
        };
      }

      function setModule(matrix, row, col, dark, reserved = true) {
        if (row < 0 || col < 0 || row >= matrix.size || col >= matrix.size) return;
        matrix.data[row][col] = !!dark;
        if (reserved) matrix.reserved[row][col] = true;
      }

      function addFinder(matrix, row, col) {
        for (let r = -1; r <= 7; r++) for (let c = -1; c <= 7; c++) {
          const rr = row + r, cc = col + c;
          const dark = r >= 0 && r <= 6 && c >= 0 && c <= 6 && (r === 0 || r === 6 || c === 0 || c === 6 || (r >= 2 && r <= 4 && c >= 2 && c <= 4));
          setModule(matrix, rr, cc, dark, true);
        }
      }

      function addPatterns(matrix, version) {
        const size = matrix.size;
        addFinder(matrix, 0, 0);
        addFinder(matrix, 0, size - 7);
        addFinder(matrix, size - 7, 0);
        for (let i = 8; i < size - 8; i++) {
          setModule(matrix, 6, i, i % 2 === 0, true);
          setModule(matrix, i, 6, i % 2 === 0, true);
        }
        for (const ar of QR_CAPACITY[version].align) for (const ac of QR_CAPACITY[version].align) {
          if ((ar === 6 && ac === 6) || (ar === 6 && ac === size - 7) || (ar === size - 7 && ac === 6)) continue;
          for (let r = -2; r <= 2; r++) for (let c = -2; c <= 2; c++) {
            setModule(matrix, ar + r, ac + c, Math.max(Math.abs(r), Math.abs(c)) !== 1, true);
          }
        }
        setModule(matrix, size - 8, 8, true, true);
        for (let i = 0; i < 9; i++) {
          if (i !== 6) {
            setModule(matrix, 8, i, false, true);
            setModule(matrix, i, 8, false, true);
          }
        }
        for (let i = size - 8; i < size; i++) setModule(matrix, 8, i, false, true);
        for (let i = size - 7; i < size; i++) setModule(matrix, i, 8, false, true);
      }

      function formatBits() {
        let data = (1 << 3) | 0;
        let bits = data << 10;
        const poly = 0x537;
        for (let i = 14; i >= 10; i--) if ((bits >> i) & 1) bits ^= poly << (i - 10);
        return (((data << 10) | bits) ^ 0x5412) & 0x7fff;
      }

      function addFormat(matrix) {
        const bits = formatBits();
        const size = matrix.size;
        const coordsA = [[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
        const coordsB = [[size-1,8],[size-2,8],[size-3,8],[size-4,8],[size-5,8],[size-6,8],[size-7,8],[8,size-8],[8,size-7],[8,size-6],[8,size-5],[8,size-4],[8,size-3],[8,size-2],[8,size-1]];
        for (let i = 0; i < 15; i++) {
          const dark = ((bits >> i) & 1) === 1;
          setModule(matrix, coordsA[i][0], coordsA[i][1], dark, true);
          setModule(matrix, coordsB[i][0], coordsB[i][1], dark, true);
        }
      }

      function addData(matrix, bytes) {
        const bits = bytes.flatMap((byte) => Array.from({ length: 8 }, (_, i) => (byte >> (7 - i)) & 1));
        let bitIndex = 0;
        let upward = true;
        for (let col = matrix.size - 1; col > 0; col -= 2) {
          if (col === 6) col--;
          for (let rowStep = 0; rowStep < matrix.size; rowStep++) {
            const row = upward ? matrix.size - 1 - rowStep : rowStep;
            for (let c = 0; c < 2; c++) {
              const cc = col - c;
              if (matrix.reserved[row][cc]) continue;
              const bit = bitIndex < bits.length ? bits[bitIndex++] : 0;
              const mask = (row + cc) % 2 === 0;
              setModule(matrix, row, cc, Boolean(bit) !== mask, false);
            }
          }
          upward = !upward;
        }
      }

      function chooseQrVersion(text) {
        const length = new TextEncoder().encode(text).length;
        for (let version = 1; version <= 4; version++) {
          const usable = QR_CAPACITY[version].data - 2;
          if (length <= usable) return version;
        }
        throw new Error("二维码内容过长，第一版最多约 78 字节");
      }

      function createQrSvg(text, size = 256, errorCorrectionLevel = "L") {
        if (!text.trim()) throw new Error("请输入二维码内容");
        if (errorCorrectionLevel !== "L") throw new Error("第一版仅支持 L 纠错等级");
        const version = chooseQrVersion(text);
        const cap = QR_CAPACITY[version];
        const matrix = makeMatrix(17 + version * 4);
        addPatterns(matrix, version);
        const data = encodeQrData(text, version);
        addData(matrix, data.concat(rsRemainder(data, cap.ecc)));
        addFormat(matrix);
        const moduleSize = Math.max(2, Math.floor(size / (matrix.size + 4)));
        const total = (matrix.size + 4) * moduleSize;
        let path = "";
        for (let r = 0; r < matrix.size; r++) for (let c = 0; c < matrix.size; c++) {
          if (matrix.data[r][c]) path += `M${(c + 2) * moduleSize} ${(r + 2) * moduleSize}h${moduleSize}v${moduleSize}h-${moduleSize}z`;
        }
        return `<svg xmlns="http://www.w3.org/2000/svg" width="${total}" height="${total}" viewBox="0 0 ${total} ${total}"><rect width="100%" height="100%" fill="#fff"/><path d="${path}" fill="#000"/></svg>`;
      }

      function downloadQrPng(svgText, filename) {
        const blob = new Blob([svgText], { type: "image/svg+xml" });
        const url = URL.createObjectURL(blob);
        const image = new Image();
        image.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = image.width;
          canvas.height = image.height;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(image, 0, 0);
          URL.revokeObjectURL(url);
          const link = document.createElement("a");
          link.download = filename;
          link.href = canvas.toDataURL("image/png");
          link.click();
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          setStatus("二维码下载失败", "error");
        };
        image.src = url;
      }

      function renderTabs() {
        tabsEl.innerHTML = tabs.map((tab) => `<button type="button" class="tab ${tab.id === state.activeTab ? "active" : ""}" data-tab="${tab.id}">${tab.label}</button>`).join("");
        tabsEl.querySelectorAll("[data-tab]").forEach((button) => {
          button.addEventListener("click", () => {
            state.activeTab = button.dataset.tab;
            storage.activeTab = state.activeTab;
            setStatus("Ready");
            render();
          });
        });
      }

      function renderTimestamp() {
        panelEl.innerHTML = `
          <div class="tool-grid">
            <div class="pane">
              <div class="controls">
                <button id="tsNow" type="button">现在</button>
                <button id="tsParse" type="button">解析</button>
                <button id="tsClear" type="button">清空</button>
              </div>
              <label>输入时间<textarea id="tsInput" placeholder="留空使用当前时间，或输入 1719216000 / 1719216000000 / 2026-06-24 09:30:00"></textarea></label>
              <div class="hint">支持 Unix 秒、Unix 毫秒、ISO 和常见日期字符串。</div>
            </div>
            <div class="pane">
              <div class="controls"><span class="hint">结果</span></div>
              <div class="output" data-output></div>
              <div class="hint">点击右上角复制当前结果。</div>
            </div>
          </div>`;
        const input = panelEl.querySelector("#tsInput");
        const parse = () => {
          try {
            const text = formatDateBundle(parseTimestampInput(input.value));
            setOutput(text);
            setStatus("已解析");
          } catch (error) {
            setOutput("");
            setStatus(error.message, "error");
          }
        };
        panelEl.querySelector("#tsNow").addEventListener("click", () => { input.value = ""; parse(); });
        panelEl.querySelector("#tsParse").addEventListener("click", parse);
        panelEl.querySelector("#tsClear").addEventListener("click", () => { input.value = ""; setOutput(""); setStatus("已清空"); });
        parse();
      }

      function renderCodec() {
        panelEl.innerHTML = `
          <div class="tool-grid">
            <div class="pane">
              <div class="three">
                <label>操作<select id="codecMode">
                  <option value="b64enc">Base64 encode</option>
                  <option value="b64dec">Base64 decode</option>
                  <option value="urlenc">URL encode</option>
                  <option value="urldec">URL decode</option>
                  <option value="hash">Hash</option>
                  <option value="jwt">JWT decode</option>
                </select></label>
                <label>Hash<select id="hashMode">
                  <option value="MD5">MD5</option>
                  <option value="SHA-1">SHA-1</option>
                  <option value="SHA-256">SHA-256</option>
                </select></label>
                <label>&nbsp;<button id="codecRun" type="button">运行</button></label>
              </div>
              <label>输入<textarea id="codecInput" placeholder="输入文本、Base64、URL 编码文本或 JWT"></textarea></label>
              <div class="hint">JWT 只解码 header 和 payload，不校验签名。</div>
            </div>
            <div class="pane">
              <div class="controls"><span class="hint">结果</span></div>
              <div class="output" data-output></div>
              <div class="hint">所有处理都在本地页面完成。</div>
            </div>
          </div>`;
        panelEl.querySelector("#codecRun").addEventListener("click", async () => {
          const mode = panelEl.querySelector("#codecMode").value;
          const hashMode = panelEl.querySelector("#hashMode").value;
          const input = panelEl.querySelector("#codecInput").value;
          try {
            let result = "";
            if (mode === "b64enc") result = utf8ToBase64(input);
            if (mode === "b64dec") result = base64ToUtf8(input);
            if (mode === "urlenc") result = encodeURIComponent(input);
            if (mode === "urldec") result = decodeURIComponent(input);
            if (mode === "jwt") result = decodeJwt(input);
            if (mode === "hash") result = hashMode === "MD5" ? md5(input) : await digestText(hashMode, input);
            setOutput(result);
            setStatus("已运行");
          } catch (error) {
            setOutput("");
            setStatus(error.message, "error");
          }
        });
      }

      function renderRegex() {
        panelEl.innerHTML = `
          <div class="tool-grid">
            <div class="pane">
              <div class="two">
                <label>Pattern<input id="regexPattern" value="\\w+" /></label>
                <label>Flags<input id="regexFlags" value="g" /></label>
              </div>
              <label>测试文本<textarea id="regexInput" placeholder="Paste text here"></textarea></label>
              <div class="controls"><button id="regexRun" type="button">匹配</button></div>
            </div>
            <div class="pane">
              <div class="controls"><span class="hint">匹配结果</span></div>
              <div class="output" data-output></div>
              <div class="hint">显示 index、match 和 captures。</div>
            </div>
          </div>`;
        panelEl.querySelector("#regexRun").addEventListener("click", () => {
          try {
            const matches = runRegex(panelEl.querySelector("#regexPattern").value, panelEl.querySelector("#regexFlags").value, panelEl.querySelector("#regexInput").value);
            const result = matches.length ? matches.map((m, i) => `${i + 1}. index ${m.index}: ${JSON.stringify(m.text)}${m.captures.length ? `\n   captures: ${m.captures.map((c) => JSON.stringify(c)).join(", ")}` : ""}`).join("\n") : "No matches";
            setOutput(result);
            setStatus(`${matches.length} matches`);
          } catch (error) {
            setOutput("");
            setStatus(error.message, "error");
          }
        });
      }

      function renderCron() {
        panelEl.innerHTML = `
          <div class="tool-grid">
            <div class="pane">
              <div class="controls">
                <button data-cron="*/5 * * * *" type="button">每 5 分钟</button>
                <button data-cron="0 9 * * 1-5" type="button">工作日 9 点</button>
                <button id="cronRun" type="button">预览</button>
              </div>
              <label>Cron<input id="cronInput" value="*/5 * * * *" /></label>
              <div class="hint">支持 5 段 Unix cron：minute hour day month weekday。</div>
            </div>
            <div class="pane">
              <div class="controls"><span class="hint">下 5 次执行</span></div>
              <div class="output" data-output></div>
              <div class="hint">基础语法：*、*/n、a,b、a-b、数字。</div>
            </div>
          </div>`;
        const input = panelEl.querySelector("#cronInput");
        const run = () => {
          try {
            const result = nextCronRuns(input.value).map((date) => date.toLocaleString()).join("\n");
            setOutput(result);
            setStatus("已预览");
          } catch (error) {
            setOutput("");
            setStatus(error.message, "error");
          }
        };
        panelEl.querySelectorAll("[data-cron]").forEach((button) => button.addEventListener("click", () => { input.value = button.dataset.cron; run(); }));
        panelEl.querySelector("#cronRun").addEventListener("click", run);
        run();
      }

      function renderQrCode() {
        panelEl.innerHTML = `
          <div class="tool-grid">
            <div class="pane">
              <div class="three">
                <label>尺寸<select id="qrSize"><option>192</option><option selected>256</option><option>320</option></select></label>
                <label>纠错<select id="qrLevel"><option selected>L</option></select></label>
                <label>&nbsp;<button id="qrGenerate" type="button">生成</button></label>
              </div>
              <label>内容<textarea id="qrInput" placeholder="输入文本或 URL"></textarea></label>
              <div class="controls"><button id="qrDownload" type="button" disabled>下载 PNG</button></div>
              <div class="hint">第一版离线 QR 支持常见短文本，最多约 78 字节。</div>
            </div>
            <div class="pane">
              <div class="controls"><span class="hint">二维码</span></div>
              <div class="qr-stage"><div class="qr-card" id="qrPreview"><span class="hint">等待生成</span></div></div>
              <div class="hint">二维码生成不访问网络。</div>
            </div>
          </div>`;
        const generate = () => {
          try {
            const text = panelEl.querySelector("#qrInput").value;
            const size = Number(panelEl.querySelector("#qrSize").value);
            const level = panelEl.querySelector("#qrLevel").value;
            state.qrSvg = createQrSvg(text, size, level);
            state.lastCopyText = state.qrSvg;
            panelEl.querySelector("#qrPreview").innerHTML = state.qrSvg;
            panelEl.querySelector("#qrDownload").disabled = false;
            setStatus("已生成");
          } catch (error) {
            state.qrSvg = "";
            panelEl.querySelector("#qrPreview").innerHTML = `<span class="hint">${escapeHtml(error.message)}</span>`;
            panelEl.querySelector("#qrDownload").disabled = true;
            setStatus(error.message, "error");
          }
        };
        panelEl.querySelector("#qrGenerate").addEventListener("click", generate);
        panelEl.querySelector("#qrDownload").addEventListener("click", () => downloadQrPng(state.qrSvg, "devlauncher-qrcode.png"));
      }

      function render() {
        renderTabs();
        if (state.activeTab === "timestamp") renderTimestamp();
        if (state.activeTab === "codec") renderCodec();
        if (state.activeTab === "regex") renderRegex();
        if (state.activeTab === "cron") renderCron();
        if (state.activeTab === "qrcode") renderQrCode();
      }

      render();
    </script>
  </body>
</html>
